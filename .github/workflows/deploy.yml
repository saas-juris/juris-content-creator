name: Deploy to Railway

on:
  workflow_dispatch:
    # Manuel tetikleme — Railway GitHub App entegrasyonu aktifken bu workflow pasif

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: juris-content-creator
